name: Build Release

on:
  push:
    branches: [master, dev]
    tags: ["v*"]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: task-graph-editor
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: task-graph-editor
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: task-graph-editor.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 缓存 Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      # Linux 系统依赖
      - name: 安装 Linux 依赖
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev pkg-config \
            libxkbcommon-dev libgl1-mesa-dev \
            libwayland-dev libxcb-shape0-dev libxcb-xfixes0-dev

      # macOS 系统依赖
      - name: 安装 macOS 依赖
        if: runner.os == 'macOS'
        run: brew install openssl pkg-config

      # Windows：NASM 用于 openssl vendored 编译
      - name: 安装 Windows 依赖
        if: runner.os == 'Windows'
        run: choco install nasm -y

      - name: 代码检查
        run: |
          cargo fmt --all -- --check
          cargo clippy --target ${{ matrix.target }} -- -D warnings

      - name: 运行测试
        run: cargo test --target ${{ matrix.target }}

      - name: 构建 Release
        run: cargo build --release --target ${{ matrix.target }}

      - name: 打包产物 (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} dist/
          cd dist
          tar czf task-graph-editor-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}

      - name: 打包产物 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.artifact }}" -Destination dist/
          Compress-Archive -Path "dist/${{ matrix.artifact }}" -DestinationPath "dist/task-graph-editor-${{ matrix.target }}.zip"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: task-graph-editor-${{ matrix.target }}
          path: |
            dist/task-graph-editor-${{ matrix.target }}.tar.gz
            dist/task-graph-editor-${{ matrix.target }}.zip
          if-no-files-found: ignore

  # 有 tag 时自动创建 Release
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
