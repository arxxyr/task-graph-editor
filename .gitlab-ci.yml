stages:
  - check
  - build

variables:
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

# 全局缓存
cache: &cargo_cache
  key: ${CI_JOB_NAME}-${CI_COMMIT_REF_SLUG}
  paths:
    - .cargo/registry
    - .cargo/git
    - target

# ============================================================
# 代码质量检查（仅 Linux）
# ============================================================
check:
  stage: check
  image: rust:latest
  before_script:
    - apt-get update && apt-get install -y
        libssl-dev pkg-config
        libxkbcommon-dev libgl1-mesa-dev
        libwayland-dev libxcb-shape0-dev libxcb-xfixes0-dev
    - rustup component add rustfmt clippy
  script:
    - cargo fmt --all -- --check
    - cargo clippy -- -D warnings
    - cargo test
  cache:
    <<: *cargo_cache

# ============================================================
# 构建 - Ubuntu 22.04 x86_64
# ============================================================
build:linux-x64:
  stage: build
  image: rust:latest
  needs: [check]
  before_script:
    - apt-get update && apt-get install -y
        libssl-dev pkg-config
        libxkbcommon-dev libgl1-mesa-dev
        libwayland-dev libxcb-shape0-dev libxcb-xfixes0-dev
  script:
    - cargo build --release --target x86_64-unknown-linux-gnu
    - mkdir -p dist
    - cp target/x86_64-unknown-linux-gnu/release/task-graph-editor dist/
    - cd dist && tar czf task-graph-editor-x86_64-unknown-linux-gnu.tar.gz task-graph-editor
  artifacts:
    paths:
      - dist/task-graph-editor-x86_64-unknown-linux-gnu.tar.gz
    expire_in: 30 days
  cache:
    <<: *cargo_cache

# ============================================================
# 构建 - macOS ARM64
# ============================================================
build:macos-arm64:
  stage: build
  needs: [check]
  tags:
    - macos
    - arm64
  before_script:
    - brew install openssl pkg-config || true
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
    - source "$HOME/.cargo/env"
    - rustup target add aarch64-apple-darwin
  script:
    - cargo build --release --target aarch64-apple-darwin
    - mkdir -p dist
    - cp target/aarch64-apple-darwin/release/task-graph-editor dist/
    - cd dist && tar czf task-graph-editor-aarch64-apple-darwin.tar.gz task-graph-editor
  artifacts:
    paths:
      - dist/task-graph-editor-aarch64-apple-darwin.tar.gz
    expire_in: 30 days
  cache:
    <<: *cargo_cache

# ============================================================
# 构建 - Windows x86_64
# ============================================================
build:windows-x64:
  stage: build
  needs: [check]
  tags:
    - windows
    - x64
  before_script:
    - choco install nasm -y
    - rustup target add x86_64-pc-windows-msvc
  script:
    - cargo build --release --target x86_64-pc-windows-msvc
    - mkdir -Force dist
    - Copy-Item "target\x86_64-pc-windows-msvc\release\task-graph-editor.exe" -Destination dist\
    - Compress-Archive -Path "dist\task-graph-editor.exe" -DestinationPath "dist\task-graph-editor-x86_64-pc-windows-msvc.zip"
  artifacts:
    paths:
      - dist/task-graph-editor-x86_64-pc-windows-msvc.zip
    expire_in: 30 days
  cache:
    <<: *cargo_cache
